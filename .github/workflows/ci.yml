---
name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  molecule:
    name: Molecule
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Molecule
        run: |
          molecule test 2>&1 | tee /tmp/molecule-output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          echo "## Molecule Output" >> $GITHUB_STEP_SUMMARY
          tail -150 /tmp/molecule-output.txt >> $GITHUB_STEP_SUMMARY
          exit $EXIT_CODE
        working-directory: roles/hermes
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
